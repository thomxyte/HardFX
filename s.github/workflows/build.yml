name: Build HardFX Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ── WINDOWS VST3 ────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (VST3)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scarica JUCE 8.0.3
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/juce-framework/JUCE/archive/refs/tags/8.0.3.zip" -OutFile "juce.zip"
          Expand-Archive -Path "juce.zip" -DestinationPath "."
          Rename-Item "JUCE-8.0.3" "JUCE"

      - name: Configura CMake
        run: cmake -B build -G "Visual Studio 17 2022" -A x64

      - name: Compila Release
        run: cmake --build build --config Release --parallel

      - name: Trova e copia VST3
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $files = Get-ChildItem -Recurse -Path build -Filter "*.vst3"
          foreach ($f in $files) {
            if ($f.PSIsContainer) {
              Copy-Item -Recurse -Force $f.FullName dist\
            } else {
              Copy-Item -Force $f.FullName dist\
            }
          }
          Write-Host "Contenuto dist:"
          Get-ChildItem -Recurse dist

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: HardFX-Windows-VST3
          path: dist/
          if-no-files-found: error

  # ── MAC VST3 + AU ───────────────────────────────────────────────────────────
  build-mac:
    name: macOS (VST3 + AU)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scarica JUCE 8.0.3
        run: |
          curl -L "https://github.com/juce-framework/JUCE/archive/refs/tags/8.0.3.tar.gz" -o juce.tar.gz
          tar -xzf juce.tar.gz
          mv JUCE-8.0.3 JUCE

      - name: Configura CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Compila
        run: cmake --build build --config Release

      - name: Trova e copia artefatti
        run: |
          mkdir -p dist
          find build -name "*.vst3" | xargs -I{} cp -r {} dist/ 2>/dev/null || true
          find build -name "*.component" | xargs -I{} cp -r {} dist/ 2>/dev/null || true
          echo "Contenuto dist:"
          ls -la dist/

      - name: Upload Mac
        uses: actions/upload-artifact@v4
        with:
          name: HardFX-macOS
          path: dist/
          if-no-files-found: error
